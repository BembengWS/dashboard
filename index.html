<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Telco Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="row">
    <div class="card">
      <h2>OVERALL ORDER</h2>
      <canvas id="overallChart"></canvas>
    </div>

    <div class="card">
      <h2>OVERALL ORDER (TERRITORY BASED)</h2>
      <table id="regionTable"></table>
    </div>
  </div>

  <div class="card full">
    <h2>DEMAND PLANNING</h2>

    <div class="kpi">
      <div>Total Order<br><span id="k1">0</span></div>
      <div>On Air<br><span id="k4">0</span></div>
      <div>Achievement<br><span id="k5">0%</span></div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
