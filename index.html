<!DOCTYPE html>
<html>
<head>
  <title>Telco Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="row">
    <div class="card">
      <h2>OVERALL ORDER</h2>
      <canvas id="overallChart"></canvas>
      <div class="legend">
        <span>Order 2026</span>
        <span>Carry Over</span>
      </div>
    </div>

    <div class="card">
      <h2>OVERALL ORDER (TERRITORY BASED)</h2>
      <table id="regionTable"></table>
    </div>
  </div>

  <div class="card full">
    <h2>DEMAND PLANNING</h2>

    <div class="kpi">
      <div>Total Kuota <span id="k1">0</span></div>
      <div>Usage <span id="k2">0</span></div>
      <div>Saldo <span id="k3">0</span></div>
      <div>On Air <span id="k4">0</span></div>
      <div>Ach <span id="k5">0%</span></div>
    </div>

    <table id="categoryTable"></table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
